<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootswatch/5.2.3/slate/bootstrap.min.css" integrity="sha512-GixPbJydZH3yyD23SgcC/i/FIhLb+0F26ABBvEg9ejj90hYuXXjPphWTWTX5dIuolObna6iXz1nr5nog6Dex7w==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css" integrity="sha512-MV7K8+y+gLIBoVD59lQIYicR65iaqukzvf/nwasF0nqhPay5w/9lJmVM2hMDcnK1OnMGCdVK+iQrJ7lzPJQd1w==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Zen Vite</title>
  </head>
  <body>
    <div class="container mt-2">
      <button id="start-button" type="button" class="btn btn-primary mb-2">
        <i class="fa-solid fa-fw fa-play"></i>
        Start
      </button>
      
      <button id="stop-button" type="button" class="btn btn-primary mb-2">
        <i class="fa-solid fa-fw fa-stop"></i>
        Stop
      </button>

      <button id="clear-button" type="button" class="btn btn-primary mb-2">
        <i class="fa-solid fa-fw fa-trash"></i>
        Clear
      </button>
  
      <div class="card bg-primary">
        <div class="card-body">
          <pre id="output" class="m-0" style="height: 400px; color:#00ffff"></pre>
        </div>
      </div>
    </div>
    
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
